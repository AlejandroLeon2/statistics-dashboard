<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles/global.css" />
    <title>Dashboard - Statistics App</title>
    <link rel="stylesheet" href="dashboardPage.css" />
  </head>
  <body>
    <header id="header"></header>
    <main id="main" class="container-fluid py-4">
      <header class="mb-4">
        <h1 class="h3 fw-bold">Dashboard de Gestión – Restaurante</h1>
        <p class="text-muted mb-0">Resumen de estadísticas y métricas</p>
      </header>

      <section
        id="KPIs-section"
        class="row g-4 mb-4"
        aria-label="KPIs"
      ></section>

      <section class="row g-4 mb-4" aria-label="Gráficos de ventas">
        <article class="col-lg-6 col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-white border-0 py-3">
              <h2
                class="h6 mb-0 fw-semibold"
                style="color: var(--chart-color-1)"
              >
                Ventas por Método de Pago
              </h2>
            </div>
            <div class="card-body">
              <canvas id="myChart"></canvas>
            </div>
          </div>
        </article>

        <article class="col-lg-6 col-md-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-white border-0 py-3">
              <h2
                class="h6 mb-0 fw-semibold"
                style="color: var(--chart-color-1)"
              >
                Tareas por Estado
              </h2>
            </div>
            <div class="card-body">
              <canvas id="chartTareasPorEstado"></canvas>
            </div>
          </div>
        </article>
        <article class="col-lg-12 col-md-12">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-white border-0 py-3">
              <h2
                class="h6 mb-0 fw-semibold"
                style="color: var(--chart-color-1)"
              >
                Ventas por Categoría
              </h2>
            </div>
            <div class="card-body">
              <canvas id="chartCategoria"></canvas>
            </div>
          </div>
        </article>
      </section>

      <section class="row g-4 mb-4" aria-label="Gráficos temporales">
        <article class="col-lg-12 col-md-12">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-white border-0 py-3">
              <h2
                class="h6 mb-0 fw-semibold"
                style="color: var(--chart-color-1)"
              >
                Ventas por Hora
              </h2>
            </div>
            <div class="card-body">
              <canvas id="chartVentasPorHora"></canvas>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script type="module" src="./dashboardPage.js"></script>
    <script type="module" src="../../scripts/metodoPago.js"></script>
    <script type="module" src="../../scripts/ventasCategoria.js"></script>
    <script type="module" src="../../scripts/ventasPorHora.js"></script>
    <script type="module" src="../../scripts/taresPorEstado.js"></script>
  </body>
</html>
